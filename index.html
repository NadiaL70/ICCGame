<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC Singapore: The Molecular Chain Reaction</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #0b132b; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }
        #controls { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(28, 37, 65, 0.85); 
            padding: 25px; 
            border-radius: 12px; 
            backdrop-filter: blur(10px); 
            z-index: 10; 
            border: 1px solid #5bc0be;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 280px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #6fffe9; }
        p { font-size: 13px; line-height: 1.4; opacity: 0.9; }
        input { 
            padding: 10px; 
            border-radius: 4px; 
            border: 1px solid #3a506b; 
            margin-bottom: 12px; 
            display: block; 
            width: 100%; 
            background: #0b132b; 
            color: white;
            box-sizing: border-box;
        }
        button { 
            background: #5bc0be; 
            color: #1c2541; 
            border: none; 
            padding: 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            transition: background 0.3s;
        }
        button:hover { background: #6fffe9; }
        #stats { margin-top: 15px; font-size: 11px; color: #5bc0be; text-transform: uppercase; letter-spacing: 1px; }
        svg { width: 100vw; height: 100vh; cursor: move; }
    </style>
</head>
<body>

<div id="controls">
    <h2>International Chemistry Conference</h2>
    <p>Synthesize your bond. Add your research keyword to the global community molecule.</p>
    
    <input type="text" id="name" placeholder="Name (e.g. Dr. A. Smith)">
    <input type="text" id="keyword" placeholder="Research (e.g. Catalysis)">
    <button onclick="addBond()">Synthesize Bond</button>
    
    <div id="stats">Collective Synthesis in Progress...</div>
</div>

<svg id="molecule"></svg>

<script>
    const G_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw--aolYtrAQFQDsd9fux5jgLg2eFgsuUoMA3hNW01aGmsFkIuSpVr1qbm2WbAVg03J/exec';

    const width = window.innerWidth;
    const height = window.innerHeight;
    const svg = d3.select("#molecule")
        .call(d3.zoom().on("zoom", (event) => {
            container.attr("transform", event.transform);
        }))
        .append("g");

    const container = svg.append("g");

    // Central Node: Singapore
    let nodes = [{ id: "Singapore", group: 1, size: 25, label: "ICC Singapore" }];
    let links = [];

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(120))
        .force("charge", d3.forceManyBody().strength(-400))
        .force("center", d3.forceCenter(width / 2, height / 2));

    function update() {
        const link = container.selectAll(".link")
            .data(links)
            .join("line")
            .attr("stroke", "#5bc0be")
            .attr("stroke-opacity", 0.4)
            .attr("stroke-width", 2);

        const node = container.selectAll(".node")
            .data(nodes)
            .join("g")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.selectAll("circle")
            .data(d => [d])
            .join("circle")
            .attr("r", d => d.size || 12)
            .attr("fill", d => d.id === "Singapore" ? "#ff4d4d" : "#6fffe9")
            .attr("stroke", "#0b132b")
            .attr("stroke-width", 2);

        node.selectAll("text")
            .data(d => [d])
            .join("text")
            .text(d => d.label || d.id)
            .attr("font-size", "12px")
            .attr("fill", "white")
            .attr("dx", 15)
            .attr("dy", 4)
            .style("pointer-events", "none")
            .style("text-shadow", "2px 2px 4px #000");

        simulation.nodes(nodes);
        simulation.force("link").links(links);
        simulation.alpha(0.3).restart();

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        document.getElementById('stats').innerText = `${nodes.length - 1} Active Research Bonds`;
    }

    // Load existing data from Google Sheet on startup
    window.onload = function() {
        fetch(G_SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    const nodeId = `${item.name}-${item.keyword}`;
                    if (!nodes.find(n => n.id === nodeId)) {
                        nodes.push({ id: nodeId, group: 2, label: `${item.name}: ${item.keyword}` });
                        links.push({ source: "Singapore", target: nodeId });
                    }
                });
                update();
            })
            .catch(err => console.error("Error loading data:", err));
    };

    function addBond() {
        const name = document.getElementById('name').value;
        const key = document.getElementById('keyword').value;
        
        if(!name || !key) {
            alert("Please provide both name and research keyword.");
            return;
        }

        const nodeId = `${name}-${key}`;
        
        // Visual Update
        nodes.push({ id: nodeId, group: 2, label: `${name}: ${key}` });
        links.push({ source: "Singapore", target: nodeId });
        update();

        // Save to Google Sheets
        fetch(G_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ name: name, keyword: key })
        });

        // Clear inputs
        document.getElementById('name').value = '';
        document.getElementById('keyword').value = '';
    }

    // Drag functions for interactivity
    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }

    update();
</script>
</body>
</html>

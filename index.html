<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICC 2026: One World, One Chemistry</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #02040a; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui-layer { 
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 25px; border: 1px solid #00f2ff;
            box-shadow: 0 0 20px rgba(0,242,255,0.2); width: 280px;
        }
        h1 { font-size: 12px; letter-spacing: 5px; color: #00f2ff; margin: 0; }
        h2 { font-size: 18px; margin: 10px 0; font-weight: 100; text-transform: uppercase; }
        input { 
            width: 100%; padding: 10px; margin: 8px 0; background: transparent; 
            border: 1px solid #333; color: #00f2ff; outline: none; box-sizing: border-box;
        }
        input:focus { border-color: #00f2ff; }
        button { 
            width: 100%; padding: 12px; background: #00f2ff; border: none; 
            color: #000; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #stats { font-size: 9px; color: #555; margin-top: 15px; text-align: center; }
        svg { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>ICC 2026</h1>
    <h2>Molecular Synthesis</h2>
    <input type="text" id="name" placeholder="RESEARCHER NAME">
    <input type="text" id="keyword" placeholder="RESEARCH AREA (e.g. POLYMERS)">
    <button onclick="addBond()">SYNTHESIZE</button>
    <div id="stats">SYSTEM STATUS: READY</div>
</div>

<svg id="canvas"></svg>

<script>
    const G_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxq7zoarTNZoyoOHcYjeBmqx8h5VGd3NYqWQs6JISqUi-J_Ik-4rBa6W9kpmOpD6lNA/exec';
    
    const width = window.innerWidth, height = window.innerHeight;
    const svg = d3.select("#canvas");
    const container = svg.append("g");

    // Glow effect
    const defs = svg.append("defs");
    const glow = defs.append("filter").attr("id", "glow");
    glow.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
    const feMerge = glow.append("feMerge");
    feMerge.append("feMergeNode").attr("in", "blur");
    feMerge.append("feMergeNode").attr("in", "SourceGraphic");

    svg.call(d3.zoom().on("zoom", (e) => container.attr("transform", e.transform)));

    let nodes = [];
    let links = [];
    let singaporeCreated = false;

    // Simulation with RIGID constraints
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(80).strength(1)) // Strength 1 = Rigid
        .force("charge", d3.forceManyBody().strength(-400))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(50));

    function update() {
        const link = container.selectAll(".link").data(links, d => d.source.id + "-" + d.target.id)
            .join("line")
            .attr("stroke", "#00f2ff")
            .attr("stroke-opacity", 0.5)
            .attr("stroke-width", 2);

        const node = container.selectAll(".node").data(nodes, d => d.id)
            .join("g")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.selectAll("circle").data(d => [d]).join("circle")
            .attr("r", d => d.isSeed ? 18 : 10)
            .attr("fill", "#02040a")
            .attr("stroke", d => d.isSeed ? "#ff4d4d" : "#00f2ff")
            .attr("stroke-width", 2)
            .style("filter", "url(#glow)");

        node.selectAll("text").data(d => [d]).join("text")
            .attr("text-anchor", "middle")
            .attr("dy", d => d.isSeed ? 30 : 25)
            .style("font-size", "10px")
            .style("fill", "#fff")
            .text(d => d.label.toUpperCase());

        simulation.nodes(nodes);
        simulation.force("link").links(links);
        simulation.alpha(0.2).restart();

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
    }

    function createSingaporeNode() {
        if (singaporeCreated) return "SINGAPORE_ANCHOR";
        const sg = { id: "SINGAPORE_ANCHOR", label: "SINGAPORE ICC", isSeed: true };
        nodes.push(sg);
        singaporeCreated = true;
        return sg.id;
    }

    function grow(name, area) {
        const areaId = "AREA_" + area.toUpperCase().replace(/\s+/g, '');
        const personId = (name + area).replace(/\s+/g, '');

        if (nodes.find(n => n.id === personId)) return;

        // 1. Ensure Singapore exists now that data is present
        const anchorId = createSingaporeNode();

        // 2. Create Area Hub if it doesn't exist
        let areaNode = nodes.find(n => n.id === areaId);
        if (!areaNode) {
            areaNode = { id: areaId, label: area.toUpperCase(), isArea: true };
            nodes.push(areaNode);
            links.push({ source: anchorId, target: areaId });
        }

        // 3. Attach person to the Area
        nodes.push({ id: personId, label: name.toUpperCase() });
        links.push({ source: areaId, target: personId });
    }

    window.onload = function() {
        fetch(G_SCRIPT_URL).then(res => res.json()).then(data => {
            if(data && data.length > 0) {
                data.forEach(item => {
                    if(item.name && item.keyword) grow(item.name, item.keyword);
                });
                update();
            }
        });
    };

    function addBond() {
        const n = document.getElementById('name').value.trim();
        const a = document.getElementById('keyword').value.trim();
        if (!n || !a) return;

        grow(n, a);
        update();

        fetch(G_SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ name: n, keyword: a }) 
        });

        document.getElementById('name').value = '';
        document.getElementById('keyword').value = '';
    }

    function dragstarted(e) {
        if (!e.active) simulation.alphaTarget(0.1).restart();
        e.subject.fx = e.x; e.subject.fy = e.y;
    }
    function dragged(e) {
        e.subject.fx = e.x; e.subject.fy = e.y;
    }
    function dragended(e) {
        if (!e.active) simulation.alphaTarget(0);
        // Unlike previous versions, we don't null the FX/FY to allow 
        // researchers to manually "arrange" their clusters rigidly.
    }

    update();
</script>
</body>
</html>

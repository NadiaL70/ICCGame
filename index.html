<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC 2026: One World, One Chemistry</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #02040a; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        
        /* Glassmorphism UI */
        #ui-layer { 
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: rgba(10, 20, 40, 0.85); padding: 30px; border-radius: 12px;
            backdrop-filter: blur(15px); width: 290px;
            border: 1px solid rgba(111, 255, 233, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        
        h1 { font-size: 14px; letter-spacing: 5px; color: #6fffe9; margin: 0; text-transform: uppercase; font-weight: 200;}
        h2 { font-size: 24px; margin: 10px 0; font-weight: 200; text-transform: uppercase; line-height: 1.1;}
        p { font-size: 12px; opacity: 0.7; line-height: 1.6; margin-bottom: 25px;}
        .highlight { color: #6fffe9; font-weight: bold; }
        
        input { 
            width: 100%; padding: 14px; margin: 8px 0; background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(111, 255, 233, 0.1); color: #6fffe9; outline: none; box-sizing: border-box;
            border-radius: 6px; font-family: inherit;
        }
        
        input:focus { 
            border-color: #6fffe9; 
            background: rgba(0,0,0,0.5); 
        }

        button { 
            width: 100%; padding: 15px; background: #5bc0be; border: none; 
            color: #0b132b; font-weight: bold; cursor: pointer; margin-top: 15px;
            border-radius: 6px; text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        
        button:hover { background: #6fffe9; transform: translateY(-1px); }
        #stats { font-size: 10px; color: #5bc0be; margin-top: 20px; text-align: center; text-transform: uppercase; letter-spacing: 1px;}
        
        svg { width: 100vw; height: 100vh; cursor: grab; }
        svg:active { cursor: grabbing; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>ICC 2026</h1>
    <h2>One World,<br>One Chemistry</h2>
    <p>Synthesize the community molecule. Enter your name and <span class="highlight">one single word</span> for your research domain.</p>
    <input type="text" id="name" placeholder="RESEARCHER NAME">
    <input type="text" id="keyword" placeholder="DOMAIN (ONE WORD)">
    <button onclick="addBond()">SYNTHESIZE</button>
    <div id="stats">SYSTEM STATUS: LIVE</div>
</div>

<svg id="canvas"></svg>

<script>
    const G_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFWdBuCZdtb6nO3SzALwUOjfM3fhuV2CjuWjiERF1ZVDFzulFTPaPvMQ7ee8Y9Pxht/exec';
    
    const width = window.innerWidth, height = window.innerHeight;
    const svg = d3.select("#canvas");
    const container = svg.append("g");

    // Defs for Bloom/Glow effects
    const defs = svg.append("defs");
    const glow = defs.append("filter").attr("id", "atom-glow");
    glow.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "blur");
    const feMerge = glow.append("feMerge");
    feMerge.append("feMergeNode").attr("in", "blur");
    feMerge.append("feMergeNode").attr("in", "SourceGraphic");

    // Spectral color scale for domain hubs
    const domainColorScale = d3.scaleOrdinal(d3.schemeSpectral[11]);

    // Zoom and Pan behavior
    svg.call(d3.zoom().scaleExtent([0.1, 3]).on("zoom", (e) => container.attr("transform", e.transform)));

    // Initial state: Singapore is the seed node
    let nodes = [{ id: "SINGAPORE_ANCHOR", label: "SINGAPORE ICC", isSeed: true, size: 28 }];
    let links = [];

    // RIGID Molecular Simulation Physics
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(100).strength(1)) 
        .force("charge", d3.forceManyBody().strength(-600))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(70));

    function update() {
        // Render Bonds (Sticks)
        const link = container.selectAll(".link").data(links, d => d.source.id + "-" + d.target.id)
            .join("line")
            .attr("class", "link")
            .attr("stroke", "#333")
            .attr("stroke-opacity", 0.6)
            .attr("stroke-width", 2);

        // Render Nodes (Atoms)
        const node = container.selectAll(".node").data(nodes, d => d.id)
            .join("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        node.selectAll("circle").data(d => [d]).join("circle")
            .attr("r", d => d.size || 15)
            .attr("fill", "#02040a")
            .attr("stroke", d => {
                if (d.isSeed) return "#ff4d4d"; 
                if (d.isArea) return domainColorScale(d.label.charAt(0)); 
                return "#6fffe9"; 
            })
            .attr("stroke-width", 3)
            .style("filter", "url(#atom-glow)");

        node.selectAll("text").data(d => [d]).join("text")
            .attr("text-anchor", "middle")
            .attr("dy", d => d.size ? d.size + 25 : 35)
            .style("font-size", d => d.isSeed ? "12px" : (d.isArea ? "11px" : "10px"))
            .style("fill", "#fff")
            .style("pointer-events", "none")
            .text(d => d.label.toUpperCase());

        simulation.nodes(nodes);
        simulation.force("link").links(links);
        simulation.alpha(0.3).restart();

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        document.getElementById('stats').innerText = `${nodes.length - 1} Researchers Interconnected`;
    }

    function process(name, area) {
        // Enforce the "One Word" rule
        area = area.trim().split(" ")[0].toUpperCase();
        if (!area) return;

        const areaId = "AREA_" + area;
        const personId = (name + area).replace(/\s+/g, '').toUpperCase();

        if (nodes.find(n => n.id === personId)) return;

        // Ensure Area Hub exists
        let areaNode = nodes.find(n => n.id === areaId);
        if (!areaNode) {
            areaNode = { id: areaId, label: area, isArea: true, size: 20 };
            nodes.push(areaNode);
            links.push({ source: "SINGAPORE_ANCHOR", target: areaId });
        }

        // Attach person to Area Hub
        nodes.push({ id: personId, label: name.toUpperCase() });
        links.push({ source: areaId, target: personId });
    }

    window.onload = function() {
        fetch(G_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                if(data && data.length > 0) {
                    data.forEach(item => {
                        if(item.name && item.keyword && item.name.toUpperCase() !== "SINGAPORE ICC") {
                            process(item.name, item.keyword);
                        }
                    });
                    update();
                }
            })
            .catch(err => {
                console.warn("Initial load empty or failed. Seed active.");
                update(); 
            });
    };

    function addBond() {
        const nInput = document.getElementById('name');
        const kInput = document.getElementById('keyword');
        const n = nInput.value.trim();
        let a = kInput.value.trim();
        
        if (!n || !a) return;

        // Process locally for instant visual feedback
        process(n, a);
        update();

        // Ensure we only send the single-word domain to the sheet
        const singleWordArea = a.trim().split(" ")[0];
        fetch(G_SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ name: n, keyword: singleWordArea }) 
        });

        nInput.value = '';
        kInput.value = '';
    }

    function dragstarted(e) { if (!e.active) simulation.alphaTarget(0.1).restart(); e.subject.fx = e.x; e.subject.fy = e.y; }
    function dragged(e) { e.subject.fx = e.x; e.subject.fy = e.y; }
    function dragended(e) { if (!e.active) simulation.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }

    update();
</script>
</body>
</html>

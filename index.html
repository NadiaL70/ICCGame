<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ICC Singapore: Molecular Synthesis</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; background: #0b132b; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #controls { 
            position: absolute; top: 20px; left: 20px; background: rgba(28, 37, 65, 0.95); 
            padding: 20px; border-radius: 12px; z-index: 10; border: 1px solid #5bc0be; 
            width: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-size: 18px; margin: 0 0 10px 0; color: #6fffe9; }
        p { font-size: 12px; opacity: 0.8; margin-bottom: 15px; }
        input { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #3a506b; 
            background: #0b132b; color: white; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #6fffe9; }
        button { 
            width: 100%; padding: 12px; background: #5bc0be; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; margin-top: 10px; color: #1c2541; transition: 0.3s;
        }
        button:hover { background: #6fffe9; transform: translateY(-1px); }
        #stats { font-size: 11px; margin-top: 15px; color: #5bc0be; text-align: center; letter-spacing: 1px; }
        svg { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

<div id="controls">
    <h2>ICC Synthesis Map</h2>
    <p>PhD researchers: Add your bond to the global network below.</p>
    <input type="text" id="name" placeholder="Name (e.g. Dr. Lee)">
    <input type="text" id="keyword" placeholder="Research (e.g. Bio-Chemistry)">
    <button onclick="addBond()">Synthesize Bond</button>
    <div id="stats">Connecting to Network...</div>
</div>

<svg id="molecule"></svg>

<script>
    const G_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxq7zoarTNZoyoOHcYjeBmqx8h5VGd3NYqWQs6JISqUi-J_Ik-4rBa6W9kpmOpD6lNA/exec';

    const width = window.innerWidth;
    const height = window.innerHeight;
    const svg = d3.select("#molecule");
    const container = svg.append("g");

    // Static Seed: Singapore
    let nodes = [{ id: "Singapore", label: "ICC Singapore", size: 24, isSeed: true }];
    let links = [];

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(140))
        .force("charge", d3.forceManyBody().strength(-600))
        .force("center", d3.forceCenter(width / 2, height / 2));

    function update() {
        const link = container.selectAll(".link").data(links).join("line")
            .attr("stroke", "#5bc0be").attr("stroke-opacity", 0.4).attr("stroke-width", 2);

        const node = container.selectAll(".node").data(nodes, d => d.id).join("g")
            .attr("class", "node")
            .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

        node.selectAll("circle").data(d => [d]).join("circle")
            .attr("r", d => d.size || 12)
            .attr("fill", d => d.isSeed ? "#ff4d4d" : "#6fffe9")
            .attr("stroke", "#0b132b").attr("stroke-width", 2);

        node.selectAll("text").data(d => [d]).join("text")
            .text(d => d.label)
            .attr("font-size", "12px").attr("fill", "white").attr("dx", 16).attr("dy", 4)
            .style("text-shadow", "1px 1px 3px #000");

        simulation.nodes(nodes);
        simulation.force("link").links(links);
        simulation.alpha(0.5).restart();

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        document.getElementById('stats').innerText = `${nodes.length - 1} BONDS SYNTHESIZED`;
    }

    // INITIAL DATA FETCH
    window.onload = function() {
        fetch(G_SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                if(data && data.length > 0) {
                    data.forEach(item => {
                        const id = (item.name + item.keyword).replace(/\s+/g, '');
                        // Prevent duplicates and don't re-add Singapore
                        if (!nodes.find(n => n.id === id) && item.name !== "ICC Singapore") {
                            nodes.push({ id: id, label: `${item.name}: ${item.keyword}` });
                            links.push({ source: "Singapore", target: id });
                        }
                    });
                }
                update();
            })
            .catch(err => {
                console.log("Starting fresh molecule.");
                update();
            });
    };

    function addBond() {
        const n = document.getElementById('name').value.trim();
        const k = document.getElementById('keyword').value.trim();
        if (!n || !k) return;

        const id = (n + k).replace(/\s+/g, '');
        if (nodes.find(node => node.id === id)) {
            alert("This research bond is already in the network!");
            return;
        }

        // Add to UI
        nodes.push({ id: id, label: `${n}: ${k}` });
        links.push({ source: "Singapore", target: id });
        update();

        // Save to Google Sheet
        fetch(G_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: n, keyword: k })
        });

        document.getElementById('name').value = '';
        document.getElementById('keyword').value = '';
    }

    function dragstarted(e) { if (!e.active) simulation.alphaTarget(0.3).restart(); e.subject.fx = e.x; e.subject.fy = e.y; }
    function dragged(e) { e.subject.fx = e.x; e.subject.fy = e.y; }
    function dragended(e) { if (!e.active) simulation.alphaTarget(0); e.subject.fx = null; e.subject.fy = null; }

    update();
</script>
</body>
</html>

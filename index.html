<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC Singapore: The Quantum Network</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* 1. Base Layer & Atmosphere */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #101935 0%, #050812 100%); 
            color: #E0E1DD; 
            font-family: 'Avenir Next', 'Helvetica Neue', sans-serif; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* 2. Controls - Glassmorphism UI */
        #controls { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            background: rgba(16, 25, 53, 0.6); 
            padding: 25px; 
            border-radius: 16px; 
            z-index: 10; 
            border: 1px solid rgba(111, 255, 233, 0.3); 
            width: 270px; 
            backdrop-filter: blur(12px); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        h2 { 
            font-size: 20px; 
            margin: 0 0 10px 0; 
            color: #6fffe9; 
            font-weight: 200; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        p { 
            font-size: 13px; 
            opacity: 0.7; 
            margin: 0 0 20px 0; 
            line-height: 1.5;
        }

        /* 3. Inputs - Minimal & Sleek */
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 6px; 
            border: 1px solid rgba(111, 255, 233, 0.1); 
            background: rgba(5, 8, 18, 0.7); 
            color: #6fffe9; 
            box-sizing: border-box; 
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus { 
            border-color: rgba(111, 255, 233, 0.8); 
            box-shadow: 0 0 10px rgba(111, 255, 233, 0.2); 
        }

        input::placeholder { color: rgba(111, 255, 233, 0.4); }

        /* 4. Button - Neon Pulse */
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #5bc0be 0%, #3a506b 100%);
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 15px; 
            color: #050812; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(91, 192, 190, 0.3);
        }

        button:hover { 
            box-shadow: 0 5px 25px rgba(91, 192, 190, 0.6);
            transform: translateY(-2px);
        }

        /* 5. Stats & SVG Layer */
        #stats { 
            font-size: 11px; 
            margin-top: 18px; 
            color: #5bc0be; 
            text-align: center; 
            letter-spacing: 1px; 
            text-transform: uppercase;
            font-weight: 200;
        }

        svg { 
            width: 100vw; 
            height: 100vh; 
            cursor: move;
        }
    </style>
</head>
<body>

<div id="controls">
    <h2>Quantum Network</h2>
    <p>PhD Researchers: Anchor your work to the ICC community. Add your research to synthesize the collective molecule.</p>
    <input type="text" id="name" placeholder="Dr. Alan Smith">
    <input type="text" id="keyword" placeholder="Enzymatic Catalysis">
    <button onclick="addBond()">Synthesize Bond</button>
    <div id="stats">Connecting to Network...</div>
</div>

<svg id="molecule"></svg>

<script>
    // PASTE YOUR URL HERE
    const G_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxq7zoarTNZoyoOHcYjeBmqx8h5VGd3NYqWQs6JISqUi-J_Ik-4rBa6W9kpmOpD6lNA/exec';

    const width = window.innerWidth;
    const height = window.innerHeight;
    const svg = d3.select("#molecule");

    // Add SVG filters (Glow effect)
    const defs = svg.append("defs");
    const glowFilter = defs.append("filter")
        .attr("id", "glow")
        .attr("x", "-50%")
        .attr("y", "-50%")
        .attr("width", "200%")
        .attr("height", "200%");
    glowFilter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
    const feMerge = glowFilter.append("feMerge");
    feMerge.append("feMergeNode").attr("in", "coloredBlur");
    feMerge.append("feMergeNode").attr("in", "SourceGraphic");

    // Create 3D sphere gradient
    const gradient = defs.append("radialGradient")
        .attr("id", "sphereGradient")
        .attr("cx", "30%")
        .attr("cy", "30%");
    gradient.append("stop").attr("offset", "0%").attr("stop-color", "#ffffff").attr("stop-opacity", 1);
    gradient.append("stop").attr("offset", "100%").attr("stop-color", "#6fffe9").attr("stop-opacity", 1);

    const gradientRed = defs.append("radialGradient")
        .attr("id", "sphereGradientRed")
        .attr("cx", "30%")
        .attr("cy", "30%");
    gradientRed.append("stop").attr("offset", "0%").attr("stop-color", "#ffffff").attr("stop-opacity", 1);
    gradientRed.append("stop").attr("offset", "100%").attr("stop-color", "#ff4d4d").attr("stop-opacity", 1);

    // D3 Container with Zoom
    const container = svg.append("g");
    svg.call(d3.zoom().scaleExtent([0.1, 4]).on("zoom", (event) => {
        container.attr("transform", event.transform);
    }));

    // Data structure
    let nodes = [{ id: "Singapore", label: "ICC Singapore", size: 28, isSeed: true }];
    let links = [];

    // Force Simulation (Physics engine)
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(160))
        .force("charge", d3.forceManyBody().strength(-800))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(d => d.size * 2 + 5));

    // D3 Update function (Visuals rendering)
    function update() {
        const link = container.selectAll(".link")
            .data(links, d => `${d.source.id}-${d.target.id}`)
            .join("line")
            .attr("class", "link")
            .attr("stroke", "#5bc0be")
            .attr("stroke-opacity", 0.1) // Subtle lines
            .attr("stroke-width", 1.5)
            .style("pointer-events", "none");

        const node = container.selectAll(".node")
            .data(nodes, d => d.id)
            .join("g")
            .attr("class", "node")
            .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

        // Create the Spherical Nodes
        node.selectAll("circle")
            .data(d => [d])
            .join("circle")
            .attr("r", d => d.size || 14)
            .attr("fill", d => d.isSeed ? "url(#sphereGradientRed)" : "url(#sphereGradient)")
            .style("filter", "url(#glow)") // Apply Glow
            .style("stroke", d => d.isSeed ? "rgba(255, 77, 77, 0.4)" : "rgba(111, 255, 233, 0.4)")
            .style("stroke-width", 2);

        // Advanced Labels
        const labels = node.selectAll("text")
            .data(d => [d])
            .join("text")
            .attr("class", "label")
            .attr("text-anchor", "middle")
            .attr("dy", d => d.size ? d.size + 20 : 34) // Position below sphere
            .style("pointer-events", "none")
            .style("text-shadow", "0 0 5px rgba(0,0,0,1)"); // Text shadow for visibility

        labels.selectAll("tspan")
            .data(d => d.label.split(': ')) // Split Name: Keyword
            .join("tspan")
            .attr("x", 0)
            .attr("dy", (d, i) => i * 15) // Stacked text
            .text(d => d)
            .attr("font-size", (d, i) => i === 0 ? "13px" : "11px") // Name larger than keyword
            .attr("fill", (d, i) => i === 0 ? "#E0E1DD" : "#5bc0be") // Grey for name, Cyan for keyword
            .style("font-weight", (d, i) => i === 0 ? "500" : "100");

        simulation.nodes(nodes);
        simulation.force("link").links(links);
        simulation.alpha(0.8).restart(); // High restart alpha for movement

        simulation.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // Update Stats UI
        document.getElementById('stats').innerText = `${nodes.length - 1} Bonds Synthesized`;
    }

    // Load data from Google Sheet on startup
    window.onload = function() {
        fetch(G_SCRIPT_URL)
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    const nodeId = `${item.name}-${item.keyword}`.replace(/\s+/g, '');
                    // Prevent duplicates and don't re-add Singapore seed
                    if (!nodes.find(n => n.id === nodeId) && item.name !== "ICC Singapore") {
                        nodes.push({ id: nodeId, group: 2, label: `${item.name}: ${item.keyword}` });
                        links.push({ source: "Singapore", target: nodeId });
                    }
                });
                update();
            })
            .catch(err => {
                console.log("Molecule loading error or empty sheet.");
                update(); // Load seed anyway
            });
    };

    function addBond() {
        const nameInput = document.getElementById('name');
        const keyInput = document.getElementById('keyword');
        const name = nameInput.value.trim();
        const key = keyInput.value.trim();
        
        if(!name || !key) return; // Basic check

        const nodeId = `${name}-${key}`.replace(/\s+/g, '');
        if (nodes.find(node => node.id === nodeId)) {
            alert("This research bond is already synthesized.");
            return;
        }

        // Add to UI immediately (visual reward)
        nodes.push({ id: nodeId, group: 2, label: `${name}: ${key}` });
        links.push({ source: "Singapore", target: nodeId });
        update();

        // Save to Google Sheet permanently (silent post)
        fetch(G_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, keyword: key })
        });

        // Clear inputs
        nameInput.value = '';
        keyInput.value = '';
    }

    // Dragging physics behavior
    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }

    update(); // Initial load
</script>
</body>
</html>
